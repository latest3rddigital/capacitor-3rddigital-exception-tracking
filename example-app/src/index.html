<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>3rdDigital Native Exception Tracking</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <meta name="format-detection" content="telephone=no" />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1c2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 36px;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #52606f;
        line-height: 1.55;
      }

      section {
        margin-top: 22px;
        padding: 18px;
        border: 1px solid #dbe1e8;
        border-radius: 8px;
        background: #ffffff;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 650;
        color: #344255;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid #c8d1dc;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        color: #17202c;
        background: #ffffff;
      }

      .toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 18px;
        margin-top: 14px;
      }

      .toggles label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        min-height: 40px;
        border: 1px solid #b9c5d2;
        border-radius: 6px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 700;
        color: #142033;
        background: #ffffff;
      }

      button.primary {
        border-color: #1f6feb;
        color: #ffffff;
        background: #1f6feb;
      }

      button.danger {
        border-color: #d12f2f;
        color: #ffffff;
        background: #d12f2f;
      }

      .status {
        margin-top: 14px;
        min-height: 38px;
        padding: 10px 12px;
        border-radius: 6px;
        background: #eef4ff;
        color: #24456f;
        font-weight: 650;
      }

      .meta {
        margin-top: 10px;
        font-size: 13px;
      }

      ul {
        display: grid;
        gap: 10px;
        min-height: 140px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        border: 1px solid #e0e6ee;
        border-radius: 6px;
        padding: 10px;
        background: #fbfcfe;
      }

      pre {
        max-height: 260px;
        overflow: auto;
        margin: 8px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        line-height: 1.45;
        color: #2c3644;
      }

      @media (max-width: 720px) {
        h1 {
          font-size: 28px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>3rdDigital Native Exception Tracking</h1>
      <p>Configure the Capacitor native crash handler, retry pending reports, and trigger a native test crash.</p>
      <p class="meta">Platform: <strong id="platform">detecting</strong></p>

      <section>
        <h2>Configuration</h2>
        <div class="grid">
          <label>
            API URL
            <input id="url" type="text" placeholder="https://dev.3rddigital.com/appupdate-api/api" />
          </label>
          <label>
            Project Key
            <input id="projectKey" type="text" placeholder="project-key" />
          </label>
          <label>
            API Key
            <input id="apiKey" type="password" placeholder="api-key" />
          </label>
          <label>
            App Version
            <input id="appVersion" type="text" value="1.0.0" />
          </label>
        </div>

        <div class="toggles">
          <label>
            <input id="enabled" type="checkbox" checked />
            Exception tracking
          </label>
          <label>
            <input id="nativeFallbackEnabled" type="checkbox" checked />
            Native fallback upload
          </label>
          <label>
            <input id="executeOriginalHandler" type="checkbox" checked />
            Execute original handler
          </label>
          <label>
            <input id="forceToQuit" type="checkbox" />
            Force quit
          </label>
        </div>

        <div class="actions">
          <button id="configure" class="primary" type="button">Configure Handler</button>
          <button id="uploadPending" type="button">Upload Pending</button>
          <button id="crashForTesting" class="danger" type="button">Crash Native App</button>
          <button id="clearLog" type="button">Clear Log</button>
        </div>

        <div id="status" class="status">Ready.</div>
      </section>

      <section>
        <h2>Events</h2>
        <ul id="eventLog"></ul>
      </section>
    </main>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
